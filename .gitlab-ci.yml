stages:
  - build
  - test
  - deploy

variables:
  DOCKER_IMAGE_NAME: event-ticket-api

# ---------------------------------------------------------------------
# Этап 1: сборка .NET-проекта
# ---------------------------------------------------------------------
build:
  stage: build
  image: mcr.microsoft.com/dotnet/sdk:9.0
  script:
    - cd EventTicketApi
    - dotnet restore
    - dotnet build --configuration Release --no-restore
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# ---------------------------------------------------------------------
# Этап 2: прогон unit-тестов
# ---------------------------------------------------------------------
test:
  stage: test
  image: mcr.microsoft.com/dotnet/sdk:9.0
  script:
    - cd EventTicketApi
    - dotnet restore
    - dotnet test tests/EventTicketApi.Tests/EventTicketApi.Tests.csproj --configuration Release --logger "console;verbosity=normal"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# ---------------------------------------------------------------------
# Этап 3: сборка Docker-образа и развёртывание (запуск контейнера)
# ---------------------------------------------------------------------
deploy:
  stage: deploy
  image: docker:24
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
  script:
    - cd EventTicketApi
    - docker build -t $DOCKER_IMAGE_NAME:$CI_COMMIT_SHORT_SHA -t $DOCKER_IMAGE_NAME:latest .
    - docker rm -f event-ticket-api-deployed || true
    - docker run -d --name event-ticket-api-deployed --network gitlab_default -p 8081:8080 $DOCKER_IMAGE_NAME:latest
    - sleep 5
    - docker ps --filter "name=event-ticket-api-deployed"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'